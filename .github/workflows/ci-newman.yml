name: API Tests with Newman

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
    test-api:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            - name: Start json-server in the background
              run: |
                json-server --watch db.json --port 3000 --host 0.0.0.0 &
                sleep 3

            - name: Verify API is running
              run: curl -f http://localhost:3000/posts || exit 1

            - name: Run Newman tests
              run: |
                newman run "collections/JSONPlaceholder - Complete CRUD.postman_collection.json" \
                  -e "environments/Dev.postman_environment.json" \
                  -r html --reporter-html-export reports/newman-report.html

            - name: Upload Newman report
              uses: actions/upload-artifact@v4
              with:
                name: newman-report
                path: reports/newman-report.html
